name: stickup-beta

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stickup
      POSTGRES_PASSWORD: stickup
      POSTGRES_DB: stickup
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickup -d stickup"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
