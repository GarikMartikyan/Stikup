# =====================================================================
#  PRODUCTION stack — single droplet, cheapest setup.
#
#  Services: Postgres (+volume) · Redis · backend · frontend · Caddy
#  (auto-HTTPS reverse proxy) · nightly Postgres backup.
#
#  Postgres and Redis are NOT published to the host — they are only
#  reachable on the internal compose network. Only Caddy exposes
#  ports (80/443) to the internet.
#
#  Secret hygiene: only the BACKEND needs the secret-bearing env files
#  (.env.production[.local]). The frontend receives just the handful of
#  non-secret runtime vars it actually reads, so a frontend compromise
#  can never leak the bot token, Google secret, or DB password.
#
#  Deploy (on the server):
#    docker compose \
#      --env-file .env.production \
#      --env-file .env.production.local \
#      -f docker-compose.prod.yml up -d
#
#  Images default to GHCR tags but can be built locally with:
#    docker compose -f docker-compose.prod.yml build
# =====================================================================
name: stickup-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - stickup-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - stickup-prod-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/garikmartikyan/stikup-backend:latest}
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The backend legitimately needs the full secret set.
    env_file:
      - .env.production
      - path: .env.production.local
        required: false
    environment:
      # Reach Postgres/Redis over the compose network (override any host value).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3131/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/garikmartikyan/stikup-frontend:latest}
    build:
      context: ./frontend
      args:
        # Baked at build time: server-side origin + client-visible bot URL.
        BACKEND_URL: http://backend:3131
        NEXT_PUBLIC_TELEGRAM_BOT_URL: ${NEXT_PUBLIC_TELEGRAM_BOT_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # NO env_file here — the frontend must not receive backend secrets.
    # Only the non-secret vars it reads at runtime are passed explicitly.
    environment:
      NODE_ENV: production
      # Server-side SSR/rewrites talk to the backend over the compose network.
      BACKEND_URL: http://backend:3131
      # Name of the session cookie the frontend looks for (non-secret).
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sid}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Nightly dump; keep a rolling window of daily/weekly/monthly backups.
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: '7'
      BACKUP_KEEP_WEEKS: '4'
      BACKUP_KEEP_MONTHS: '6'
      HEALTHCHECK_PORT: '8080'
    volumes:
      - ./backups:/backups

volumes:
  stickup-prod-postgres:
  stickup-prod-redis:
  caddy-data:
  caddy-config:
