name: stickup-beta

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DATABASE_URL so the backend container talks to the
      # `postgres` service over the compose network instead of localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      # Override REDIS_URL so the backend reaches Redis via the compose network.
      REDIS_URL: redis://redis:6379
      # Pin the in-container sticker path to the named volume mount.
      STICKER_STORAGE_DIR: /app/backend/public/packs
    ports:
      - '${PORT}:3131'
    volumes:
      - stickup-stickers:/app/backend/public/packs

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:3131
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    ports:
      - '${FRONTEND_PORT}:3000'

volumes:
  postgres-data:
  stickup-stickers:
